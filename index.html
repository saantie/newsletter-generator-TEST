const sha256=async(str)=>{

  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');

/* singleton: ref เก็บ stopAll ของ VoiceBtn ที่กำลัง active อยู่ (1 ตัวเท่านั้น) */
let _activeVoiceStop=null;

const VoiceBtn=({value,onChange,inputRef})=>{
  const [rec,setRec]=useState(false);
  const rrRef=useRef(null);
  const recRef=useRef(false);
  const baseRef=useRef("");const finalRef=useRef("");

  const stopAll=()=>{
    recRef.current=false;
    if(rrRef.current){
      rrRef.current.onend=null;rrRef.current.onresult=null;rrRef.current.onerror=null;
      try{rrRef.current.abort();}catch(e){}
      rrRef.current=null;
    }
    if(_activeVoiceStop===stopAll)_activeVoiceStop=null;
    setRec(false);
  };

  const startSession=()=>{
    if(!recRef.current)return;
    if(rrRef.current)return;
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    const r=new SR();
    r.lang="th-TH";r.continuous=false;r.interimResults=true;
    finalRef.current="";
    r.onresult=e=>{
      let interim="";
      for(let i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i].isFinal){const t=e.results[i][0].transcript;if(t&&t.trim()){finalRef.current+=t;}}
        else{interim=e.results[i][0].transcript;}
      }
      onChange(baseRef.current+finalRef.current+interim);
    };
    r.onend=()=>{
      if(finalRef.current){baseRef.current+=finalRef.current;finalRef.current="";}
      rrRef.current=null;
      if(recRef.current){try{startSession();}catch(e){recRef.current=false;setRec(false);}}
      else{setRec(false);}
    };
    r.onerror=(e)=>{if(e.error==="no-speech"||e.error==="aborted")return;stopAll();};
    rrRef.current=r;
    try{r.start();}catch(e){stopAll();}
  };

  const toggle=()=>{
    if(recRef.current){stopAll();return;}
    if(!("webkitSpeechRecognition" in window||"SpeechRecognition" in window))return;
    if(_activeVoiceStop&&_activeVoiceStop!==stopAll){_activeVoiceStop();_activeVoiceStop=null;}
    baseRef.current=value||"";finalRef.current="";
    recRef.current=true;setRec(true);
    _activeVoiceStop=stopAll;
    startSession();
    setTimeout(()=>{if(recRef.current)stopAll();},120000);
  };
  return<button onClick={toggle} style={{padding:"5px 10px",borderRadius:8,border:rec?"2px solid #e74c3c":"1px solid #ddd",background:rec?"#fce4ec":"#fafafa",color:rec?"#e74c3c":"#bbb",cursor:"pointer",fontSize:13,flexShrink:0,animation:rec?"pulse 1s infinite":"none",minWidth:36,minHeight:36,display:"flex",alignItems:"center",justifyContent:"center"}} title={rec?"หยุดบันทึก":"พิมพ์ด้วยเสียง"}>{rec?"⏹":"🎤"}</button>;
};

    max-width:unset;
    flex:none;
    height:50vh;
    border-right:none;
  }

  .split-bar{
    width:100%;
    height:12px;
    flex:0 0 12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.10),0 -1px 4px rgba(0,0,0,0.04);
    cursor:ns-resize;
    border-top:none;border-bottom:none;
    background:#eeeef4;
  }
  .split-bar{
  width:100%;
  height:18px;
  flex:0 0 18px;
  box-shadow:0 2px 8px rgba(0,0,0,0.10),0 -1px 4px rgba(0,0,0,0.04);
  cursor:ns-resize;
  background:#eeeef4;
  touch-action:none;
  user-select:none;
  display:flex;
  flex-direction:row;
  align-items:center;
  justify-content:center;
  gap:4px;
}

  .prev-col{
    flex:1;
    min-height:0;
    overflow:hidden;
  }
}
/* ── Landscape บนมือถือ (เหมือน iPad) ── */
@media(max-width:850px) and (orientation:landscape){
  .main-wrap{flex-direction:row !important}
  .form-col{
    width:45% !important;
    height:100% !important;
    flex:none !important;
    min-width:unset !important;
    max-width:unset !important;
    min-height:0 !important;
    overflow:hidden !important;
  }
  .split-bar{
    width:14px !important;
    height:100% !important;
    flex:0 0 14px !important;
    cursor:ew-resize !important;
    flex-direction:column !important;
  }
  .prev-col{
    flex:1 !important;
    height:100% !important;
    min-height:0 !important;
    overflow:hidden !important;
  }
}

          <div style={{display:"flex",gap:10}}>
                <div style={{flex:1}}><ImgUp label="โปรไฟล์" icon="👤" src={d.profileUrl} onUpload={v=>set("profileUrl",v)} onRemove={()=>set("profileUrl","")} ac={ac} h={65}/>
                <div style={{display:"flex",alignItems:"center",gap:3,marginTop:4}}>

                </div>
                </div></div>
          <div className="sec"><div className="sec-t" style={{color:ac}}>👤 ผู้บริหาร</div>
          <div className="fld"><div style={{display:"flex",alignItems:"center",marginBottom:4}}><Label c={ac}>ชื่อ-สกุล</Label><ColorPick val={d.tcPersonName} onChange={v=>set("tcPersonName",v)} ac={ac}/><SzBtn val={d.fsPersonName} def={19} onChange={v=>set("fsPersonName",v)}/></div><Input value={d.personName} onChange={v=>set("personName",v)} placeholder="" ac={ac} voice/></div>
          <div className="fld"><div style={{display:"flex",alignItems:"center",marginBottom:4}}><Label c={ac}>ตำแหน่ง (2 บรรทัด)</Label><ColorPick val={d.tcPersonTitle} onChange={v=>set("tcPersonTitle",v)} ac={ac}/><SzBtn val={d.fsPersonTitle} def={12} onChange={v=>set("fsPersonTitle",v)}/></div><div style={{display:"flex",gap:4}}>{(()=>{const ptRef=useRef(null);return(<><div style={{flex:1}}><TextArea value={d.personTitle} onChange={v=>set("personTitle",v)} placeholder="" rows={2} ac={ac} taRef={ptRef}/></div><VoiceBtn value={d.personTitle} onChange={v=>set("personTitle",v)} inputRef={ptRef}/></>);})()}</div></div></div>
          <button onClick={()=>{if(!window.confirm("รีเซ็ตตำแหน่งหัวเรื่อง/โปรไฟล์?"))return;setHdrTextX(0);setHdrTextY(0);setProfileGX(0);setProfileGY(0);}} style={{width:"100%",padding:"6px",border:`1px solid ${ac}30`,borderRadius:8,background:`${ac}06`,color:ac,cursor:"pointer",fontSize:12,marginTop:6,fontFamily:"'Sarabun',sans-serif"}}>↺ reset ตำแหน่ง</button>
          </div>{/* end ส่วนหัว card */}
          {/* ── ส่วนเนื้อหา ── */}
          <div style={{border:`1.5px solid ${ac}30`,borderRadius:14,padding:"10px 12px 4px",marginBottom:14,background:`${ac}04`}}>
          <div id="fs-content" className="sec"><div className="sec-t" style={{color:ac}}>📝 เนื้อหา</div>
            <div className="fld">
  <div style={{display:"flex",alignItems:"center",marginBottom:4,flexWrap:"wrap",gap:2}}>
    <Label c={ac}>หัวข้อข่าว *</Label>
    <SzBtn val={d.fsHeadline} def={14} min={8} max={36} onChange={v=>set("fsHeadline",v)}/>
    {(d.hlOffX||d.hlOffY)&&<button onClick={()=>{if(!window.confirm("รีเซ็ตตำแหน่งหัวข้อข่าว?"))return;set("hlOffX",0);set("hlOffY",0);}} style={{marginLeft:6,padding:"2px 8px",border:`1px solid ${ac}40`,borderRadius:7,background:`${ac}10`,color:ac,cursor:"pointer",fontSize:12,fontWeight:600}}>↺ ตำแหน่ง</button>}
    <span style={{fontSize:12,color:"#888",marginLeft:4}}>Text:</span>
    <button onClick={()=>set("hlColor","")} style={{width:16,height:16,borderRadius:"50%",border:!d.hlColor?`2px solid ${ac}`:"1px solid #ddd",background:"linear-gradient(135deg,#4a0e2e,#5a1a1a)",cursor:"pointer",marginLeft:2}} title="Auto"/>
    <button onClick={()=>set("hlColor","#ffffff")} style={{width:16,height:16,borderRadius:"50%",border:d.hlColor==="#ffffff"?`2px solid ${ac}`:"1px solid #ddd",background:"#fff",cursor:"pointer",marginLeft:2}} title="White"/>
    <button onClick={()=>set("hlColor","#111111")} style={{width:16,height:16,borderRadius:"50%",border:d.hlColor==="#111111"?`2px solid ${ac}`:"1px solid #ddd",background:"#111",cursor:"pointer",marginLeft:2}} title="Black"/>
    <button onClick={()=>set("hlColor","#4a3728")} style={{width:16,height:16,borderRadius:"50%",border:d.hlColor==="#4a3728"?`2px solid ${ac}`:"1px solid #ddd",background:"#4a3728",cursor:"pointer",marginLeft:2}} title="Brown"/>
    <span style={{fontSize:12,color:"#888",marginLeft:4}}>BG:</span>
    <span style={{display:"inline-flex",alignItems:"center",gap:3,background:d.hlBgColor?d.hlBgColor:`linear-gradient(135deg,${ac}60,${fc2}60)`,borderRadius:999,padding:"2px 6px",border:`1px solid ${ac}40`,marginLeft:3,cursor:"pointer"}} onClick={()=>set("hlBgColor","")}>
      <button onClick={e=>{e.stopPropagation();set("hlBgColor","")}} style={{width:14,height:14,borderRadius:"50%",border:!d.hlBgColor?`2px solid rgba(255,255,255,.9)`:"1px solid rgba(255,255,255,.5)",background:"rgba(255,255,255,.2)",cursor:"pointer",padding:0}} title="Auto"/>
      <input type="color" value={d.hlBgColor||ac} onClick={e=>e.stopPropagation()} onChange={e=>set("hlBgColor",e.target.value)} style={{width:18,height:18,borderRadius:"50%",border:"2px solid rgba(255,255,255,.7)",padding:0,cursor:"pointer",background:"none"}}/>
      {d.hlBgColor&&<button onClick={e=>{e.stopPropagation();set("hlBgColor","")}} style={{fontSize:12,color:"rgba(255,255,255,.9)",background:"rgba(0,0,0,.2)",border:"none",borderRadius:8,padding:"1px 4px",cursor:"pointer"}}>✕</button>}
    </span>
  </div>
  <div style={{display:"flex",gap:4}}>
    {(()=>{const hlRef=useRef(null);return(<><div style={{flex:1}}><TextArea value={d.headline} onChange={v=>set("headline",v)} placeholder="หัวข้อกิจกรรม" rows={2} ac={ac} taRef={hlRef}/></div><VoiceBtn value={d.headline} onChange={v=>set("headline",v)} inputRef={hlRef}/></>);})()}
  </div>
</div>
            <div className="fld"><div style={{display:"flex",alignItems:"center",marginBottom:4}}><Label c={ac}>วันที่หรือหัวข้อ</Label><ColorPick val={d.tcDateText} onChange={v=>set("tcDateText",v)} ac={ac}/><SzBtn val={d.fsDateText} def={18} onChange={v=>set("fsDateText",v)}/></div><Input value={d.dateText} onChange={v=>set("dateText",v)} placeholder="วันที่ 13 มีนา......." ac={ac} voice/></div>
            <div className="fld"><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{display:"flex",alignItems:"center"}}><Label c={ac}>เนื้อหา (กด Enter 2 ครั้ง เพื่อขึ้นย่อหน้าใหม่) </Label><ColorPick val={d.tcBodyText} onChange={v=>set("tcBodyText",v)} ac={ac}/><SzBtn val={d.fsBodyText} def={17} onChange={v=>set("fsBodyText",v)}/></div><button onClick={()=>{
              /* ── หยุด ── */
              if(isRecording){
                bodyWantRec.current=false;
                if(bodyRecRef.current){
                  bodyRecRef.current.onend=null;bodyRecRef.current.onresult=null;bodyRecRef.current.onerror=null;
                  try{bodyRecRef.current.abort();}catch(e){}bodyRecRef.current=null;
                }
                setIsRecording(false);
                return;
              }
              if(!("webkitSpeechRecognition" in window||"SpeechRecognition" in window)){setExportMsg("❌ เบราว์เซอร์ไม่รองรับ");return;}
              bodyBeforeRec.current=d.bodyText||"";
              bodyWantRec.current=true;
              /* singleton: หยุด VoiceBtn อื่นก่อนเริ่ม body recorder */
              if(_activeVoiceStop){_activeVoiceStop();_activeVoiceStop=null;}
              setIsRecording(true);

              const bodyFinal={v:""};
              const startBodySession=()=>{
                if(!bodyWantRec.current)return;
                if(bodyRecRef.current)return; /* guard */
                const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
                const r=new SR();
                r.lang="th-TH";r.continuous=false;r.interimResults=true;
                bodyFinal.v="";
                r.onresult=e=>{
                  let interim="";
                  for(let i=e.resultIndex;i<e.results.length;i++){
                    if(e.results[i].isFinal){const t=e.results[i][0].transcript;if(t&&t.trim()){bodyFinal.v+=t;}}
                    else{interim=e.results[i][0].transcript;}
                  }
                  const base=bodyBeforeRec.current;
                  const sp=(base.length>0&&!base.endsWith(" "))?" ":"";
                  set("bodyText",base+sp+(bodyFinal.v+interim));
                };
                r.onend=()=>{
                  if(bodyFinal.v){
                    const base=bodyBeforeRec.current;
                    const sp=(base.length>0&&!base.endsWith(" "))?" ":"";
                    bodyBeforeRec.current=base+sp+bodyFinal.v;
                  }
                  bodyFinal.v="";
                  r.onend=null;r.onresult=null;r.onerror=null;
                  bodyRecRef.current=null;
                  if(bodyWantRec.current){try{startBodySession();}catch(e){bodyWantRec.current=false;setIsRecording(false);}}
                  else{setIsRecording(false);}
                };
                r.onerror=(e)=>{
                  if(e.error==="no-speech"||e.error==="aborted")return;
                  bodyWantRec.current=false;bodyRecRef.current=null;setIsRecording(false);
                };
                bodyRecRef.current=r;
                try{r.start();}catch(e){bodyWantRec.current=false;bodyRecRef.current=null;setIsRecording(false);}
              };
              try{startBodySession();}catch(e){bodyWantRec.current=false;setIsRecording(false);}
              /* auto-stop หลัง 2 นาที */
              setTimeout(()=>{
                if(bodyWantRec.current){
                  bodyWantRec.current=false;
                  if(bodyRecRef.current){
                    bodyRecRef.current.onend=null;bodyRecRef.current.onresult=null;bodyRecRef.current.onerror=null;
                    try{bodyRecRef.current.abort();}catch(e){}bodyRecRef.current=null;
                  }
                  setIsRecording(false);
                }
              },120000);
            }} style={{padding:"5px 12px",borderRadius:8,border:isRecording?"2px solid #e74c3c":"1px solid #ddd",background:isRecording?"#fce4ec":"#fafafa",color:isRecording?"#e74c3c":"#888",cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",gap:3,animation:isRecording?"pulse 1s infinite":"none",minHeight:34}}>{isRecording?"⏹️ หยุดบันทึก":"🎤 พิมพ์ด้วยเสียง"}</button></div><TextArea value={d.bodyText} onChange={v=>set("bodyText",v)} placeholder={"บรรทัดที่ 1... กด enter 2 ครั้งเพื่อขึ้นย่อหน้าใหม่ เพื่อไม่ให้บรรทัดสุดท้ายของย่อหน้าข้างบน ยืดออกเมื่อจัดรูปแบบ That distributed  เสร็จแล้วแตะตรงบรรทัดที่ว่าง ตามด้วยกดปุ่ม ชิดย่อหน้า เพื่อซ่อนบรรทัดที่ว่าง .\nบรรทัดที่ 2..."} rows={6} ac={ac}/>{isRecording&&<div style={{fontSize:12,color:"#e74c3c",marginTop:4,display:"flex",alignItems:"center",gap:4}}>🔴 กำลังฟัง... พูดได้เลย</div>}</div>
          <div style={{display:"flex",gap:4,marginBottom:8,flexWrap:"wrap"}}>
              <button onClick={()=>setTextAlign("distribute")} style={{flex:1,padding:"5px",borderRadius:8,border:textAlign==="distribute"?`2px solid ${ac}`:"2px solid #e8e8e8",background:textAlign==="distribute"?ac+"10":"#fafafa",color:textAlign==="distribute"?"#333":"#999",cursor:"pointer",fontSize:12}}>Thai Distributed</button>
              <button onClick={()=>setTextAlign("left")} style={{flex:1,padding:"5px",borderRadius:8,border:textAlign==="left"?`2px solid ${ac}`:"2px solid #e8e8e8",background:textAlign==="left"?ac+"10":"#fafafa",color:textAlign==="left"?"#333":"#999",cursor:"pointer",fontSize:12}}>ชิดซ้าย</button>
              <button onClick={()=>setCompactParagraph(!compactParagraph)} style={{flex:1,padding:"5px",borderRadius:8,border:compactParagraph?`2px solid ${ac}`:"2px solid #e8e8e8",background:compactParagraph?ac+"10":"#fafafa",color:compactParagraph?ac:"#999",cursor:"pointer",fontSize:12}} title="ซ่อนบรรทัดว่างระหว่างย่อหน้า">{compactParagraph?"🗜️ ชิดย่อหน้า":"↕️ ย่อหน้า"}</button>
         </div>
          </div>

function LoginScreen(){

      else{const r=await auth.signInWithEmailAndPassword(email,pass);if(!checkDomain(r.user.email)){await auth.signOut();setError(`อีเมล ${r.user.email} ไม่ได้รับอนุญาต`)}}
    }catch(err){
      const m={"auth/user-not-found":"ไม่พบบัญชีนี้","auth/wrong-password":"รหัสผ่านไม่ถูกต้อง","auth/email-already-in-use":"อีเมลนี้ถูกใช้แล้ว","auth/weak-password":"รหัสผ่านต้อง 6 ตัวขึ้นไป","auth/invalid-email":"รูปแบบอีเมลไม่ถูกต้อง","auth/invalid-credential":"อีเมลหรือรหัสผ่านไม่ถูกต้อง"};

  };

const APPS_SCRIPT_URL="https://script.google.com/macros/s/AKfycbxbs_6eqpLXd4-d6emvc_jHoczaB5gCCdL0KY0L1ab12LPyFdJ06Xq7dNUkdnplcKc9/exec"; /* ← วาง URL เช่น "https://script.google.com/macros/s/AKfyc.../exec" */
const REG_KEY="nl365reg2025";
const autoRegister=async(email)=>{
  if(!APPS_SCRIPT_URL||!email)return;
  try{
    const url=`${APPS_SCRIPT_URL}?action=register&regKey=${encodeURIComponent(REG_KEY)}&email=${encodeURIComponent(email.toLowerCase().trim())}`;
    await fetch(url);
  }catch(e){}
};

function Root(){const [user,setUser]=useState(null);const [checking,setChecking]=useState(true);const [menuOpen,setMenuOpen]=useState(false);useEffect(()=>{const unsub=auth.onAuthStateChanged(u=>{if(u&&ALLOWED_DOMAINS&&ALLOWED_DOMAINS.length>0){if(!ALLOWED_DOMAINS.some(d=>u.email.endsWith(d))){auth.signOut();setUser(null);setChecking(false);return}}if(u){window._nl365={email:u.email};autoRegister(u.email);}setUser(u);setChecking(false)});return unsub},[]);if(checking)return(<div style={{minHeight:"100vh",background:"#f8f8ff",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}><img src="./icons/icon-192x192.png" style={{width:64,height:64,borderRadius:16,objectFit:"cover"}} alt="Newsletter365"/><div style={{color:"#999",fontFamily:"'Kanit',sans-serif"}}>กำลังตรวจสอบ...</div></div>);if(!user)return <LoginScreen/>;return(<div style={{height:"100vh",display:"flex",flexDirection:"column"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 14px",background:"#fff",borderBottom:"1px solid #eee",flexShrink:0,fontSize:12}}><div style={{display:"flex",alignItems:"center",gap:8}}>{user.photoURL&&<img src={user.photoURL} style={{width:22,height:22,borderRadius:"50%"}} alt="" referrerPolicy="no-referrer"/>}<span style={{color:"#888"}}>{user.displayName||user.email}</span></div><div style={{position:"relative"}}><button onClick={()=>setMenuOpen(!menuOpen)} style={{padding:"4px 12px",border:"1px solid #ddd",borderRadius:6,background:menuOpen?"#f0f0f5":"#fafafa",color:"#888",cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",gap:4}}>☰ เมนู <span style={{fontSize:12,transform:menuOpen?"rotate(180deg)":"none",transition:"transform .2s"}}>▾</span></button>{menuOpen&&<><div onClick={()=>setMenuOpen(false)} style={{position:"fixed",inset:0,zIndex:9998}}/><div style={{position:"absolute",top:"100%",right:0,marginTop:4,background:"#fff",borderRadius:10,border:"1px solid #e8e8e8",boxShadow:"0 8px 24px rgba(0,0,0,.12)",zIndex:9999,minWidth:180,overflow:"hidden",fontFamily:"'Sarabun',sans-serif"}}><button onClick={()=>{window.open("https://saantie.github.io/newsletter-generator/user-manual.html");setMenuOpen(false)}} style={{width:"100%",padding:"10px 14px",border:"none",borderBottom:"1px solid #f0f0f0",background:"#fff",color:"#555",cursor:"pointer",fontSize:12,textAlign:"left",display:"flex",alignItems:"center",gap:8}}><span>📖</span> คู่มือการใช้งาน</button><button onClick={()=>{const subj=encodeURIComponent("สอบถาม/แจ้งปัญหา Newsletter Generator");const body=encodeURIComponent(`ผู้ใช้: ${user.email||""}\n\nรายละเอียด:\n`);window.open(`mailto:saantie@gmail.com?subject=${subj}&body=${body}`);setMenuOpen(false)}} style={{width:"100%",padding:"10px 14px",border:"none",borderBottom:"1px solid #f0f0f0",background:"#fff",color:"#555",cursor:"pointer",fontSize:12,textAlign:"left",display:"flex",alignItems:"center",gap:8}}><span>💬</span> สอบถาม/แจ้งปัญหา</button><button onClick={()=>{auth.signOut();setMenuOpen(false)}} style={{width:"100%",padding:"10px 14px",border:"none",background:"#fff",color:"#e74c3c",cursor:"pointer",fontSize:12,textAlign:"left",display:"flex",alignItems:"center",gap:8}}><span>🚪</span> ออกจากระบบ</button></div></>}</div></div><div style={{flex:1,overflow:"hidden"}}><App/></div></div>)}
ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
